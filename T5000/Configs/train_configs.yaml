data:
  cosmologies_dir: "../Data/" 
  cosmologies_info_dir: "../Data/" 
  dataset: subset_5000
  rotations: False 
  translations: False 
  cosm_param: null # null for all

model:
  fm:
    sigma_0: 0.2
    sigma_sched: False
    t_embed_dim: 64
    version: "icfm"
    prior: "uniform"
    t_embed: "sinusoidal"
    n_halos: 5000
    k: 32
    optimal_transport: False
    lambda_reg: 0.1
  egnn:
    input_node_d: 1
    input_theta_d: 5
    theta_param_embd_dim: 32
    hidden_nf: 128 
    latent_nf: 16 
    theta_nf: 256
    n_layers: 4
    mlp_layers: 2
    single_layer: True 
    recurrent: True
    activation: silu 
    norm: layer 
    attention: True
    aggregation_fn: sum 
    scale_pred: True 
    coords_weight: 1.0
    norm_diff: True

training: 
  epochs: 1000
  batch_size: 16
  batch_size_valid: 16
  clip_value: 0.5
  start_from_scratch: True
  checkpoint_path: null

  optimizer: 
    weight_decay: 1.e-4 

  scheduler:
    warmup_epochs: 0
    initial_lr: 1.e-6 
    target_lr: 5.e-4 
    
    type: cosine # plateau
    
    # plateau
    factor: 0.1
    threshold: 1.e-4
    min_lr: 1.e-7
    patience: 100 
  
  early_stopping:
    patience: 1000 
    min_delta: 1.e-4

  coupling:
    coupling: False
    optimal_transport: False

output: 
  base_path: "./results/"

logging:
  level: INFO
  epoch_log_interval: 1
  model_save_interval: 100

wandb:
  log_freq: 50  
  project_name: T5000_experiments
  run_name: k32_sin2_CFG_ot